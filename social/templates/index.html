{% load pwa %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {% progressive_web_app_meta %}
  <script src="{% static 'js/pwa-install.js' %}"></script>
  <link rel="shortcut icon" href="{% static 'images/logo.jpg' %}" type="image/x-icon">
  <title>Login - Kishivibe</title>
  <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>

  <div id="kishivibe-splash">
    <img src="{% static 'images/logo.jpg' %}" alt="Kishivibe Logo" fetchpriority="high">
  </div>

  <div class="kishivibe-container">

    <div id="kishivibe-skeleton" aria-hidden="true">
      <div class="kishivibe-skel kishivibe-skel-logo"></div>
      <div class="kishivibe-skel kishivibe-skel-title"></div>
      <div class="kishivibe-skel kishivibe-skel-sub"></div>
      <div class="kishivibe-skel kishivibe-skel-input"></div>
      <div class="kishivibe-skel kishivibe-skel-input"></div>
      <div class="kishivibe-skel kishivibe-skel-btn"></div>
      <div class="kishivibe-skel kishivibe-skel-divider"></div>
      <div class="kishivibe-skel kishivibe-skel-signup"></div>
    </div>

    <div class="kishivibe-login-container" id="kishivibe-content" aria-live="polite">

      <img src="{% static 'images/logo.jpg' %}" alt="Kishivibe" class="kishivibe-logo" fetchpriority="high">
      <h1 class="kishivibe-title">Kishivibe</h1>
      <p class="kishivibe-subtitle"><em>Share your vibe, not just posts</em></p>

      {% if messages %}
      <div class="kv-messages">
        {% for message in messages %}
        <div class="kv-msg kv-msg-{{ message.tags }}">
          <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% elif message.tags == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %}" aria-hidden="true"></i>
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="kishivibe-form" id="kishivibe-form" novalidate autocomplete="on">
        {% csrf_token %}

        <div class="kishivibe-form-group">
          <div class="kishivibe-input-wrapper">
            <i class="fas fa-user kishivibe-input-icon" aria-hidden="true"></i>
            <input type="text" name="user_check" id="kishivibe-username"
              class="kishivibe-input" placeholder="Username or email"
              autocomplete="username" autocorrect="off" autocapitalize="none"
              spellcheck="false" value="{{ request.POST.user_check|default:'' }}" required>
          </div>
        </div>

        <div class="kishivibe-form-group">
          <div class="kishivibe-input-wrapper">
            <i class="fas fa-lock kishivibe-input-icon" aria-hidden="true"></i>
            <input type="password" name="password" id="kishivibe-password"
              class="kishivibe-input" placeholder="Password"
              autocomplete="current-password" required>
            <button type="button" class="kv-pass-toggle" id="kv-pass-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="kishivibe-login-btn" id="kishivibe-login-btn">
          <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
          Log In
        </button>
      </form>

      <div class="kishivibe-divider"><span>or</span></div>

      <div class="kishivibe-signup-link">
        <p class="kishivibe-signup-text">Don't have an account?</p>
        <a href="{% url 'register' %}" class="kishivibe-signup-btn">
          <i class="fas fa-user-plus" aria-hidden="true"></i>
          Sign Up
        </a>
      </div>

    </div>
  </div>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </noscript>

  <script src="{% static 'js/index.js' %}"></script>

</body>
</html>
