
{% load static %}
{% load pwa %}
<html lang="en">  
<head>  
  <meta charset="utf-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1" />  
   {% progressive_web_app_meta %}
  <script src="{% static 'js/pwa-install.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <style>  
  
    :root {
      --nav-bg: rgba(255, 255, 255, 0.97);
      --nav-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.06);
      --nav-icon-color: #8e8e8e;   /* matches --kvibe-text-light */
      --nav-icon-active: #0095f6;  /* matches --kvibe-primary */
      --nav-accent: #0095f6;       /* matches --kvibe-primary */
      --badge-color: #0095f6;      /* matches --kvibe-primary */
      --nav-border: #dbdbdb;       /* matches --kvibe-border */
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin: 0; 
    }  
    
    /* === FLOATING PILL NAVIGATION === */
    .bottom-nav { 
      position: fixed; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 92%; 
      max-width: 400px; 
      height: 65px; 
      
      background: var(--nav-bg); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      
      border-radius: 35px; 
      box-shadow: var(--nav-shadow); 
      border: 1px solid var(--nav-border);
      
      display: flex; 
      align-items: center; 
      justify-content: space-evenly; /* Even spacing for 5 items */
      padding: 0 5px;
      z-index: 1000; 
      
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
    }
    
    /* Scroll Hide State */
    .bottom-nav.hidden { 
      transform: translate(-50%, 150%); 
      opacity: 0; 
      pointer-events: none;
    }
    
    /* === ICONS === */
    .nav-item { 
      display: flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
      color: var(--nav-icon-color); 
      font-size: 22px; 
      text-decoration: none;
      position: relative;
      transition: color 0.2s, transform 0.1s;
      border-radius: 50%;
    }
    
    .nav-item.active { 
      color: var(--nav-icon-active); 
    }
    
    .nav-item:active {
      transform: scale(0.9);
    }

    /* === FAB (CREATE POST - CENTER) === */
    .nav-fab { 
      width: 48px; 
      height: 48px; 
      background: var(--nav-accent); 
      color: #ffffff; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 20px; 
      box-shadow: 0 4px 14px rgba(0, 149, 246, 0.4); 
      cursor: pointer; 
      text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin: 0 5px;
    }
    
    .nav-fab:active {
      transform: scale(0.9);
    }

    /* === BADGES === */
    .nav-badge-count {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--badge-color);
      color: white;
      font-size: 9px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffffff;
      pointer-events: none;
    }
    
    .hidden-badge { display: none !important; }

    /* Responsive adjustments */
    @media (max-width: 360px) {
      .bottom-nav { width: 96%; height: 60px; }
      .nav-item { font-size: 20px; width: 35px; }
      .nav-fab { width: 42px; height: 42px; }
    }
  </style>  
</head>  
<body>  

<!-- Navigation Bar -->
<nav class="bottom-nav" id="bottomNav">
    
    <!-- 1. Home -->
    <a href="{% url 'home' %}" class="nav-item {% if request.path == '/' or request.path == '/home/' %}active{% endif %}" title="Home">
        <i class="fas fa-home"></i>
    </a>
    
    <!-- 2. Explore -->
    <a href="{% url 'explore' %}" class="nav-item {% if '/explore' in request.path %}active{% endif %}" title="Explore">
        <i class="far fa-compass"></i>
        <!-- Follow Badge -->
        {% if unread_follow_count and unread_follow_count > 0 %}
        <span class="nav-badge-count" id="exploreBadge">{{ unread_follow_count }}</span>
        {% endif %}
    </a>
    
    <!-- 3. Create (Center FAB) -->
    <a href="{% url 'post' %}" class="nav-fab" title="Create">
        <i class="fas fa-plus"></i>
    </a>
    
    <!-- 4. Spotlight -->
    <a href="{% url 'spotlight' %}" class="nav-item {% if '/spotlight' in request.path %}active{% endif %}" title="Spotlight">
        <i class="fas fa-play"></i>
    </a>
    
    <!-- 5. Notifications -->
    <a href="{% url 'notification_list' %}" class="nav-item notification-link {% if '/notifications' in request.path %}active{% endif %}" title="Notifications">
        <i class="far fa-bell"></i>
        
        <!-- Badge wrapper stays in DOM permanently — only the inner count text updates -->
        <div class="nav-badge-count {% if unread_notifications_count == 0 %}hidden-badge{% endif %}"
             id="footerNotificationBadge"
             data-count="{{ unread_notifications_count|default:0 }}">
          <span id="footerNotificationCount">{{ unread_notifications_count|default:0 }}</span>
          <!-- Hidden HTMX poller: updates only the count text, never touches the badge div -->
          <span
            hx-get="{% url 'notification_partial' %}"
            hx-trigger="every 5s"
            hx-target="#footerNotificationCount"
            hx-swap="innerHTML"
            style="display:none;"
          ></span>
        </div>
    </a>

</nav>  

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const bottomNav = document.getElementById('bottomNav');
    
    // --- Scroll Handling (Hide on Down, Show on Up) ---
    let lastScrollTop = 0;
    const scrollThreshold = 10;
    let isNavVisible = true;
    
    function handleScroll() {
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      const scrollDelta = scrollTop - lastScrollTop;
      
      // Prevent bouncing at top/bottom from triggering
      if (scrollTop < 0 || scrollTop + window.innerHeight > document.documentElement.scrollHeight) return;

      if (Math.abs(scrollDelta) > scrollThreshold) {
        if (scrollDelta > 0 && isNavVisible) {
          // Scrolling DOWN -> Hide
          bottomNav.classList.add('hidden');
          isNavVisible = false;
        } else if (scrollDelta < 0 && !isNavVisible) {
          // Scrolling UP -> Show
          bottomNav.classList.remove('hidden');
          isNavVisible = true;
        }
        lastScrollTop = scrollTop;
      }
    }
    
    // Throttle scroll event
    let scrollTimeout;
    window.addEventListener('scroll', function() {
      if (!scrollTimeout) {
        scrollTimeout = setTimeout(function() {
          handleScroll();
          scrollTimeout = null;
        }, 100);
      }
    });
    
    // --- Interaction: Always show nav if user touches screen (UX improvement) ---
    function showNav() {
      if (!isNavVisible) {
        bottomNav.classList.remove('hidden');
        isNavVisible = true;
      }
    }
    document.addEventListener('touchstart', showNav);
    document.addEventListener('mousedown', showNav);

    // --- Badge Updating Logic ---
    function updateNotificationIndicators() {
      const footerBadge = document.getElementById('footerNotificationBadge');
      const countEl = document.getElementById('footerNotificationCount');
      
      if (footerBadge && countEl) {
        const count = parseInt(countEl.innerText.trim()) || 0;
        
        if (count > 0) {
          footerBadge.classList.remove('hidden-badge');
          footerBadge.style.display = 'flex';
          footerBadge.dataset.count = count;
        } else {
          footerBadge.classList.add('hidden-badge');
          footerBadge.style.display = 'none';
          footerBadge.dataset.count = 0;
        }
      }
    }
    
    // Initial check
    setTimeout(updateNotificationIndicators, 500);
    
    // HTMX Hooks
    document.body.addEventListener('htmx:afterSwap', function(event) {
      if (event.target.id === 'footerNotificationBadge') {
        setTimeout(updateNotificationIndicators, 100);
      }
    });
    
    // Click listener to clear badge visually (actual clear happens on page load/API)
    const notifLink = document.querySelector('.notification-link');
    if(notifLink) {
        notifLink.addEventListener('click', () => {
            setTimeout(updateNotificationIndicators, 1000);
        });
    }
  });

  // --- Real-Time Online Status (Preserved) ---
  class RealTimeStatus {
    constructor() {
        this.ws = null;
        this.userId = window.userId; 
        this.connect();
    }
    
    connect() {
        if (!this.userId) return;
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        this.ws = new WebSocket(`${protocol}${window.location.host}/ws/online-status/`);
        
        this.ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'status_change') {
                this.updateUI(data.user_id, data.status);
            }
        };
        
        this.ws.onopen = () => {
            setInterval(() => {
                if (this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({type: 'ping'}));
                }
            }, 20000); 
        };
        
        this.ws.onclose = () => setTimeout(() => this.connect(), 3000);
    }
    
    updateUI(id, status) {
        const elements = document.querySelectorAll(`.user-status[data-user-id="${id}"]`);
        elements.forEach(el => {
            if (status === "Online") {
                el.textContent = "Online";
                el.className = "user-status online";
            } else {
                el.textContent = "Just now"; 
                el.className = "user-status offline";
            }
        });
    }
}
</script>

</body>  
</html>
{% include 'onlineStatus.html' %}
