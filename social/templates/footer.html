{% load static %}
{% load pwa %}
<html lang="en">  
<head>  
  <meta charset="utf-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1" />  
   {% progressive_web_app_meta %}
  <script src="{% static 'js/pwa-install.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <style>  
  
    :root {
      --nav-bg: rgba(255, 255, 255, 0.97);
      --nav-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.06);
      --nav-icon-color: #8e8e8e;
      --nav-icon-active: #0095f6;
      --nav-accent: #0095f6;
      --badge-color: #0095f6;
      --nav-border: #dbdbdb;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin: 0; 
    }  
    
    /* === FLOATING PILL NAVIGATION === */
    .bottom-nav { 
      position: fixed; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 92%; 
      max-width: 420px; 
      height: 65px; 
      
      background: var(--nav-bg); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      
      border-radius: 35px; 
      box-shadow: var(--nav-shadow); 
      border: 1px solid var(--nav-border);
      
      display: flex; 
      align-items: center; 
      justify-content: space-evenly;
      padding: 0 5px;
      z-index: 1000; 
      
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
    }
    
    .bottom-nav.hidden { 
      transform: translate(-50%, 150%); 
      opacity: 0; 
      pointer-events: none;
    }
    
    /* === NAV ITEMS (all icons including center) === */
    .nav-item { 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      width: 58px;
      height: 54px;
      color: var(--nav-icon-color); 
      font-size: 20px; 
      text-decoration: none;
      position: relative;
      transition: color 0.2s, transform 0.1s;
      border-radius: 16px;
    }
    
    .nav-item .nav-label {
      font-size: 9px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.02em;
      color: inherit;
    }

    .nav-item.active { 
      color: var(--nav-icon-active); 
    }
    
    .nav-item:active {
      transform: scale(0.9);
    }

    /* === BADGES === */
    .nav-badge-count {
      position: absolute;
      top: 2px;
      right: 4px;
      background: var(--badge-color);
      color: white;
      font-size: 9px;
      font-weight: 700;
      min-width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffffff;
      pointer-events: none;
    }
    
    .hidden-badge { display: none !important; }

    /* Bell animation when there are unread notifications */
    @keyframes kvibe-bell-ring {
      0%  { transform: rotate(0deg); }
      10% { transform: rotate(15deg); }
      20% { transform: rotate(-12deg); }
      30% { transform: rotate(10deg); }
      40% { transform: rotate(-8deg); }
      50% { transform: rotate(5deg); }
      60% { transform: rotate(0deg); }
      100%{ transform: rotate(0deg); }
    }
    .bell-ringing {
      animation: kvibe-bell-ring 0.6s ease forwards;
      display: inline-block;
    }

    @media (max-width: 360px) {
      .bottom-nav { width: 96%; height: 60px; }
      .nav-item { font-size: 18px; width: 50px; }
      .nav-item .nav-label { font-size: 8px; }
    }
  </style>  
</head>  
<body>  

<!-- Navigation Bar -->
<nav class="bottom-nav" id="bottomNav">
    
    <!-- 1. Home -->
    <a href="{% url 'home' %}" 
       class="nav-item {% if request.path == '/' or 'home' in request.path %}active{% endif %}" 
       title="Home">
        <i class="fas fa-home"></i>
        <span class="nav-label">Home</span>
    </a>
    
    <!-- 2. Events -->
    <a href="{% url 'event_calendar' %}" 
       class="nav-item {% if '/events' in request.path %}active{% endif %}" 
       title="Events">
        <i class="fas fa-calendar-alt"></i>
        <span class="nav-label">Events</span>
    </a>
    
    <!-- 3. Create Post (Center — now matches other items) -->
    <a href="{% url 'post' %}" 
       class="nav-item {% if '/post' in request.path %}active{% endif %}" 
       title="Post">
        <i class="fas fa-plus-square"></i>
        <span class="nav-label">Post</span>
    </a>
    
    <!-- 4. Market -->
    <a href="{% url 'market' %}" 
       class="nav-item {% if '/market' in request.path %}active{% endif %}" 
       title="Market">
        <i class="fas fa-store"></i>
        <span class="nav-label">Market</span>
    </a>
    
    <!-- 5. Channels -->
    <a href="{% url 'channel_create' %}" 
       class="nav-item {% if '/channel' in request.path %}active{% endif %}" 
       title="Channels">

        <i class="fas fa-layer-group"></i>
        <span class="nav-label">Channels</span>

        {% if total_followed_unread > 0 %}
        <div class="nav-badge-count" id="footerChannelBadge" data-count="{{ total_followed_unread }}">
            <span id="footerChannelCount">{{ total_followed_unread }}</span>
        </div>
        {% else %}
        <div class="nav-badge-count hidden-badge" id="footerChannelBadge" data-count="0">
            <span id="footerChannelCount">0</span>
        </div>
        {% endif %}

    </a>

</nav>  

<script>
  document.addEventListener('DOMContentLoaded', function () {

    var bottomNav  = document.getElementById('bottomNav');

    // ── Scroll hide / show ────────────────────────────────────────────────
    var lastScrollTop  = 0;
    var scrollThreshold = 10;
    var isNavVisible   = true;

    function handleScroll() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      var scrollDelta = scrollTop - lastScrollTop;

      if (scrollTop < 0 || scrollTop + window.innerHeight > document.documentElement.scrollHeight) return;

      if (Math.abs(scrollDelta) > scrollThreshold) {
        if (scrollDelta > 0 && isNavVisible) {
          bottomNav.classList.add('hidden');
          isNavVisible = false;
        } else if (scrollDelta < 0 && !isNavVisible) {
          bottomNav.classList.remove('hidden');
          isNavVisible = true;
        }
        lastScrollTop = scrollTop;
      }
    }

    var scrollTimeout;
    window.addEventListener('scroll', function () {
      if (!scrollTimeout) {
        scrollTimeout = setTimeout(function () {
          handleScroll();
          scrollTimeout = null;
        }, 100);
      }
    });

    // Always show nav on touch/click (UX improvement)
    function showNav() {
      if (!isNavVisible) {
        bottomNav.classList.remove('hidden');
        isNavVisible = true;
      }
    }
    document.addEventListener('touchstart', showNav);
    document.addEventListener('mousedown', showNav);

    // ── Channel badge via WebSocket ───────────────────────────────────────
    {% if user.is_authenticated %}
    (function() {
      var userId   = "{{ request.user.id }}";
      var protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      var ws       = new WebSocket(protocol + window.location.host + '/ws/user/' + userId + '/');

      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);

        if (data.type === 'unread_update') {
          var badge   = document.getElementById('footerChannelBadge');
          var countEl = document.getElementById('footerChannelCount');

          if (badge && countEl) {
            if (data.total_followed_unread > 0) {
              countEl.textContent = data.total_followed_unread;
              badge.dataset.count = data.total_followed_unread;
              badge.classList.remove('hidden-badge');
              badge.style.display = 'flex';
            } else {
              badge.classList.add('hidden-badge');
              badge.style.display = 'none';
              badge.dataset.count = 0;
            }
          }
        }
      };
    })();
    {% endif %}

  });
</script>

  {% if user.is_authenticated %}
  {% include 'onlineStatus.html' %}
  {% endif %}
</body>  
</html>
