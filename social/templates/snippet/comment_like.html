<!-- snippet/comment_like.html -->
<a
    hx-get="{% url 'comment_like' comment.comment_id %}"
    hx-target="#comment_like-{{comment.comment_id}}"
    hx-swap="innerHTML"
    hx-trigger="click throttle:200ms"
    href="#"
    class="kvibe-comment-like-btn"
    style="text-decoration: none;"
    aria-label="Like this comment">

    {% if request.user in comment.like.all %}
    <i class="fa-solid fa-heart kvibe-clb-icon kvibe-clb-icon--liked kvibe-clb-pulse"></i>
    <span class="kvibe-clb-count kvibe-clb-count--liked">
        {% if comment.like.count > 0 %}{{ comment.like.count }}{% endif %}
    </span>
    {% else %}
    <i class="fa-regular fa-heart kvibe-clb-icon"></i>
    <span class="kvibe-clb-count">
        {% if comment.like.count > 0 %}{{ comment.like.count }}{% endif %}
    </span>
    {% endif %}
</a>

<style>
.kvibe-comment-like-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    padding: 4px 2px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.kvibe-clb-icon {
    font-size: 18px;
    color: var(--kvibe-text-light, #8e8e8e);
    transition: color 0.15s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.5);
    line-height: 1;
}

.kvibe-clb-icon--liked {
    color: var(--kvibe-primary, #0095f6);
}

.kvibe-clb-pulse {
    animation: kvibePulse 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
}

@keyframes kvibePulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.45); }
    70%  { transform: scale(0.88); }
    100% { transform: scale(1); }
}

.kvibe-clb-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--kvibe-text-light, #8e8e8e);
    line-height: 1;
    min-height: 13px;
    display: block;
    text-align: center;
    transition: color 0.15s ease;
}

.kvibe-clb-count--liked {
    color: var(--kvibe-primary, #0095f6);
}

.kvibe-comment-like-btn:active .kvibe-clb-icon {
    transform: scale(0.85);
}

.htmx-swapping .kvibe-clb-icon {
    opacity: 0.4;
    transform: scale(0.8);
}
</style>
