{% for tag, count in hashtags_page %}
<a href="{% url 'hashtag_view' tag %}" class="ks-hashtag-row">
  <div class="ks-hashtag-icon">#</div>
  <div class="ks-hashtag-info">
    <div class="ks-hashtag-name">#{{ tag }}</div>
    <div class="ks-hashtag-count">{{ count }} post{{ count|pluralize }}</div>
  </div>
  <i class="fa-solid fa-chevron-right ks-hashtag-arrow"></i>
</a>
{% empty %}
<div class="ks-empty" style="padding:30px 20px;">
  <i class="fa-solid fa-hashtag"></i>
  <p>No hashtags found</p>
</div>
{% endfor %}

{% if has_more %}
<div
  id="tags-sentinel"
  hx-get="{% url 'search_hashtags_partial' %}?q={{ query|urlencode }}&page={{ page }}"
  hx-trigger="intersect once"
  hx-target="#tags-sentinel"
  hx-swap="outerHTML"
  class="ks-load-sentinel"
>
  <span class="ks-spinner"></span>
</div>
{% endif %}
