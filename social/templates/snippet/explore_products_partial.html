{% load humanize %}
{% for product in products %}
  <a href="{% url 'product_detail' product.product_id %}" class="ks-grid-cell">
    <img src="{% if product.images.first %}{{ product.images.first.product_image.url }}{% else %}https://placehold.co/400x400/dbdbdb/8e8e8e?text=No+Image{% endif %}"
         loading="lazy" alt="{{ product.product_name }}">
    {% if product.is_promoted %}<span class="ks-grid-type-badge"><i class="fa-solid fa-bolt" style="color:#f59e0b;"></i></span>{% endif %}

    <div class="ks-grid-info">
      <span class="ks-grid-info-name">{{ product.product_name|truncatechars:20 }}</span>
    </div>

    <div class="ks-grid-overlay">
      <span>₦{{ product.product_price|intcomma }}</span>
    </div>
  </a>
{% endfor %}
{% if has_more %}
<div id="explore-sentinel"
     hx-get="{% url 'explore_products_partial' %}?page={{ page }}"
     hx-trigger="intersect once"
     hx-target="this"
     hx-swap="outerHTML"
     class="ks-load-sentinel"
     style="grid-column: 1 / -1;">
  <span class="ks-spinner"></span>
</div>
{% endif %}
