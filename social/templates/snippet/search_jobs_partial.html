{% for job in jobs %}
  <a href="{% url 'job_vacancy' %}#khj-card-{{ job.id }}" class="ks-job-row">
    <div class="ks-job-emoji" style="background:{{ job.category_color }}1a;color:{{ job.category_color }};">{{ job.category_emoji }}</div>
    <div class="ks-job-info">
      <div class="ks-job-title">{{ job.title }}</div>
      <div class="ks-job-meta">{{ job.company }}{% if job.location %} · {{ job.location|truncatechars:30 }}{% endif %}</div>
      {% if job.salary_range %}<div class="ks-job-salary">{{ job.salary_range }}</div>{% endif %}
    </div>
    <span class="ks-job-badge" style="background:{{ job.category_color }}1a;color:{{ job.category_color }};">{{ job.get_category_display }}</span>
  </a>
{% endfor %}
{% if has_more %}
<div id="jobs-sentinel" hx-get="{% url 'search_jobs_partial' %}?q={{ query|urlencode }}&page={{ page }}"
  hx-trigger="intersect once" hx-target="#jobs-sentinel" hx-swap="outerHTML"
  class="ks-load-sentinel"><span class="ks-spinner"></span></div>
{% endif %}
