{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="{% static 'images/logo.jpg' %}" type="image/x-icon">
    <title>Account Not Available / Kishiface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --kf-white: #ffffff;
            --kf-text: #111111;
            --kf-gray: #6b7280;
            --kf-gray-light: #9ca3af;
            --kf-border: #e5e7eb;
            --kf-border-light: #f3f4f6;
            --kf-bg: #f9fafb;
            --kf-accent: #0095f6;
            --radius-md: 12px;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--kf-bg);
            color: var(--kf-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .kf-blocked-card {
            background: var(--kf-white);
            border: 1px solid var(--kf-border);
            border-radius: var(--radius-md);
            padding: 48px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .kf-blocked-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--kf-border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .kf-blocked-icon i {
            font-size: 28px;
            color: var(--kf-gray);
        }

        .kf-blocked-title {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--kf-text);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .kf-blocked-desc {
            font-size: 14px;
            color: var(--kf-gray);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .kf-blocked-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .kf-blocked-btn {
            display: block;
            padding: 11px 20px;
            border-radius: var(--radius-full);
            font-size: 13.5px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }

        .kf-blocked-btn-primary {
            background: #0095f6;
            color: #ffffff;
        }

        .kf-blocked-btn-primary:hover {
            background: #0095f6;
        }

        .kf-blocked-btn-secondary {
            background: var(--kf-border-light);
            color: var(--kf-text);
            border: 1px solid var(--kf-border);
        }

        .kf-blocked-btn-secondary:hover {
            background: var(--kf-border);
        }

        .kf-blocked-divider {
            height: 1px;
            background: var(--kf-border-light);
            margin: 20px 0;
        }

        .kf-blocked-note {
            font-size: 12px;
            color: var(--kf-gray-light);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="kf-blocked-card">
        <div class="kf-blocked-icon">
            <i class="fas fa-user-slash"></i>
        </div>

        <h1 class="kf-blocked-title">This account is not available</h1>

        <p class="kf-blocked-desc">
            This profile can't be viewed right now.
            It may have been restricted or made unavailable to you.
        </p>

        <div class="kf-blocked-actions">
            <a href="{% url 'home' %}" class="kf-blocked-btn kf-blocked-btn-primary">
                <i class="fas fa-home" style="margin-right:6px;font-size:12px;"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="kf-blocked-btn kf-blocked-btn-secondary">
                <i class="fas fa-arrow-left" style="margin-right:6px;font-size:12px;"></i> Go Back
            </a>
        </div>

        <div class="kf-blocked-divider"></div>

        <p class="kf-blocked-note">
            If you think this is a mistake, you can
            <a href="{% url 'home' %}" style="color:#0095f6;text-decoration:none;">contact support</a>.
        </p>
    </div>

</body>
</html>
